<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="こえメモ">
  <title>こえメモ</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --danger: #ef4444;
      --success: #22c55e;
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #24242f;
      --text: #f0f0f5;
      --text-muted: #888899;
      --border: #2e2e3e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    /* --- Recorder area --- */
    .recorder {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 28px;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }

    #transcript-box {
      width: 100%;
      min-height: 80px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    #transcript-box:focus {
      border-color: var(--primary);
    }

    #transcript-box.listening {
      border-color: var(--danger);
      animation: pulse-border 1.2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: var(--danger); }
      50%       { border-color: #ff8888; }
    }

    .placeholder-text {
      color: var(--text-muted);
      pointer-events: none;
      user-select: none;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-mic {
      background: var(--primary);
      color: #fff;
    }

    .btn-mic.recording {
      background: var(--danger);
    }

    .btn-save {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* --- Status --- */
    #status {
      font-size: 0.82rem;
      color: var(--text-muted);
      min-height: 18px;
      text-align: center;
    }

    #status.error { color: #f87171; }
    #status.success { color: var(--success); }

    /* --- List --- */
    .list-header {
      padding: 16px 20px 8px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #worry-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .worry-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fade-in 0.25s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .worry-content {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
    }

    .worry-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 40px 0;
    }

    /* ripple mic animation */
    .mic-icon {
      position: relative;
      display: inline-block;
    }

    .recording .mic-icon::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      animation: ripple 1s ease-out infinite;
    }

    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>こえメモ</h1>
</header>

<section class="recorder">
  <textarea
    id="transcript-box"
    rows="3"
    placeholder="マイクボタンを押して話してください..."
  ></textarea>

  <div id="status"></div>

  <div class="btn-row">
    <button class="btn btn-mic" id="mic-btn" onclick="toggleListening()">
      <span class="mic-icon">🎤</span>
      <span id="mic-label">録音開始</span>
    </button>
    <button class="btn btn-save" id="save-btn" onclick="saveEntry()" disabled>
      💾 保存
    </button>
  </div>
</section>

<div class="list-header">保存済みメモ</div>
<div id="worry-list"><p class="empty-state">読み込み中...</p></div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ── Supabase 設定 ──────────────────────────────────────────────
  const SUPABASE_URL  = 'https://rbhbwmecembcxcqmyhun.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiaGJ3bWVjZW1iY3hjcW15aHVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDc4NDksImV4cCI6MjA5Njk4Mzg0OX0.BT-Nb_0T1npC9dwUVqAPFfZ8fyOxv6Xerf6SO9H3ZP4';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── 音声認識 ───────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;
  let finalTranscript = '';

  const transcriptBox = document.getElementById('transcript-box');
  const micBtn        = document.getElementById('mic-btn');
  const micLabel      = document.getElementById('mic-label');
  const saveBtn       = document.getElementById('save-btn');
  const statusEl      = document.getElementById('status');

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  function updateSaveBtn() {
    saveBtn.disabled = transcriptBox.value.trim() === '';
  }

  transcriptBox.addEventListener('input', updateSaveBtn);

  function initRecognition() {
    if (!SpeechRecognition) {
      setStatus('このブラウザは音声認識に対応していません（Chrome推奨）', 'error');
      micBtn.disabled = true;
      return null;
    }

    const r = new SpeechRecognition();
    r.lang = 'ja-JP';
    r.interimResults = true;
    r.continuous = true;
    r.maxAlternatives = 1;

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalTranscript += t;
        } else {
          interim += t;
        }
      }
      transcriptBox.value = finalTranscript + interim;
      updateSaveBtn();
    };

    r.onerror = (e) => {
      if (e.error === 'no-speech') return;
      setStatus('エラー: ' + e.error, 'error');
      stopListening();
    };

    r.onend = () => {
      if (isListening) {
        // Android Chromeは即時再起動で失敗するため少し待つ
        setTimeout(() => {
          if (isListening) {
            try { r.start(); } catch(_) {}
          }
        }, 150);
      }
    };

    return r;
  }

  function startListening() {
    finalTranscript = transcriptBox.value;
    recognition = initRecognition();
    if (!recognition) return;

    recognition.start();
    isListening = true;
    micBtn.classList.add('recording');
    micLabel.textContent = '録音停止';
    transcriptBox.classList.add('listening');
    setStatus('🔴 録音中... 話しかけてください');
  }

  function stopListening() {
    isListening = false;
    if (recognition) {
      recognition.onend = null;
      recognition.stop();
      recognition = null;
    }
    micBtn.classList.remove('recording');
    micLabel.textContent = '録音開始';
    transcriptBox.classList.remove('listening');
    setStatus('');
    updateSaveBtn();
  }

  function toggleListening() {
    if (isListening) stopListening();
    else startListening();
  }

  // ── 保存 ────────────────────────────────────────────────────────
  async function saveEntry() {
    const content = transcriptBox.value.trim();
    if (!content) return;

    saveBtn.disabled = true;
    setStatus('保存中...');

    const { error } = await db.from('worries').insert({ content });

    if (error) {
      setStatus('保存失敗: ' + error.message, 'error');
      saveBtn.disabled = false;
      return;
    }

    setStatus('✅ 保存しました！', 'success');
    transcriptBox.value = '';
    finalTranscript = '';
    saveBtn.disabled = true;
    setTimeout(() => setStatus(''), 2500);
    loadEntries();
  }

  // ── 一覧読み込み ────────────────────────────────────────────────
  async function loadEntries() {
    const list = document.getElementById('worry-list');

    const { data, error } = await db
      .from('worries')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) {
      list.innerHTML = '<p class="empty-state">読み込みエラー</p>';
      return;
    }

    if (!data || data.length === 0) {
      list.innerHTML = '<p class="empty-state">まだメモがありません</p>';
      return;
    }

    list.innerHTML = data.map(w => {
      const dt = new Date(w.created_at);
      const formatted = dt.toLocaleString('ja-JP', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
      return `
        <div class="worry-item">
          <div class="worry-content">${escapeHtml(w.content)}</div>
          <div class="worry-time">${formatted}</div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── 初期化 ──────────────────────────────────────────────────────
  loadEntries();
</script>
</body>
</html>
